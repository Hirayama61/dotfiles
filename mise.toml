# 全タスクの入口。dotfiles / cc-dotfiles 2 リポを扱う。

[env]
CC_DOTFILES_DIR = "{{ env.HOME }}/ghq/github.com/Hirayama61/cc-dotfiles"
CHEZMOI_DOTFILES = "{{ env.HOME }}/.config/chezmoi/dotfiles.toml"
CHEZMOI_CC_DOTFILES = "{{ env.HOME }}/.config/chezmoi/cc-dotfiles.toml"

# 大半のツール定義はグローバル設定 ~/.config/mise/config.toml に集約。
# chezmoi は bin/sync.sh で使うためここに残す
# (新マシンの bootstrap 時、まだ global config が deploy されていない段階で必要)。
[tools]
chezmoi = "latest"
# テスト/静的検査用。CI(mise-action)が global config 非依存で解決できるよう
# ここに pin する(cc-dotfiles の tests と同方針)。
bats = "1.13.0"
shellcheck = "latest"
shfmt = "latest"

# ─── 日次運用 ─────────────────────────────────────────

[tasks.apply]
description = "両リポを適用(削除自動化込み)"
depends = ["apply:dotfiles", "apply:cc-dotfiles"]

[tasks."apply:dotfiles"]
description = "dotfiles リポだけ適用"
run = "bin/sync.sh \"$CHEZMOI_DOTFILES\" dotfiles"

[tasks."apply:cc-dotfiles"]
description = "cc-dotfiles リポだけ適用(リポ未 clone なら skip)"
run = """
if [[ -d "$CC_DOTFILES_DIR" ]]; then
  # --force: Claude Code が ~/.claude/settings.json を実行時に再整形するため、
  #          テンプレートを常に正として管理外変更を確認なしで上書きする。
  bin/sync.sh "$CHEZMOI_CC_DOTFILES" cc-dotfiles --force
else
  echo "Skipping: cc-dotfiles repo not at $CC_DOTFILES_DIR"
fi
"""

[tasks.diff]
description = "両リポの pending diff を表示"
# source-aware: bin/chezmoi-source.sh は cwd の repo キー == name のとき toplevel パス(値のみ)を返す。
# worktree 内で実行すれば worktree の編集が diff に映る(apply 側と挙動を揃える)。
# 値は --source "$src" と引用付きで渡す(空白/グロブ含みパスでの語分割を防ぐ)。
run = """
echo "=== dotfiles ==="
src="$(bin/chezmoi-source.sh dotfiles)"
if [ -n "$src" ]; then
  chezmoi --config "$CHEZMOI_DOTFILES" --source "$src" diff || true
else
  chezmoi --config "$CHEZMOI_DOTFILES" diff || true
fi
if [[ -d "$CC_DOTFILES_DIR" ]]; then
  echo
  echo "=== cc-dotfiles ==="
  src="$(bin/chezmoi-source.sh cc-dotfiles)"
  if [ -n "$src" ]; then
    chezmoi --config "$CHEZMOI_CC_DOTFILES" --source "$src" diff || true
  else
    chezmoi --config "$CHEZMOI_CC_DOTFILES" diff || true
  fi
fi
"""

[tasks.update]
description = "両リポを git pull → apply"
run = """
git -C "$MISE_PROJECT_ROOT" pull --ff-only
if [[ -d "$CC_DOTFILES_DIR" ]]; then
  git -C "$CC_DOTFILES_DIR" pull --ff-only
fi
mise run apply
"""

# ─── セットアップ ─────────────────────────────────────

[tasks.bootstrap]
description = "新マシン初回セットアップ"
run = """
set -euo pipefail

echo "==> brew bundle"
brew bundle --file=./Brewfile

echo "==> chezmoi config 雛形を ~/.config/chezmoi/ に配置"
mkdir -p "$HOME/.config/chezmoi"
[[ -f "$CHEZMOI_DOTFILES" ]] || cp template/dotfiles.toml "$CHEZMOI_DOTFILES"
[[ -f "$CHEZMOI_CC_DOTFILES" ]] || cp template/cc-dotfiles.toml "$CHEZMOI_CC_DOTFILES"

echo "==> chezmoi apply(~/.config/mise/config.toml を含む dotfiles を配置)"
mise run apply

echo "==> mise install(global config のツールを取得)"
mise install

echo
echo "==> 配置完了。次の手順:"
echo "  1. $CHEZMOI_DOTFILES を編集して [data] にマシン固有値を設定"
echo "  2. 新しいシェルを開く(tmux 自動起動が走る)"
"""

[tasks."setup:codex"]
description = "個人PC専用: Codex CLI を導入(業務PCでは実行しない)"
# bootstrap の brew bundle には載せず、個人PC でだけ明示的に流す
# (業務PC には codex を入れない方針のため Brewfile から分離)。
run = "brew list --cask codex >/dev/null 2>&1 || brew install --cask codex"

# ─── メンテナンス ─────────────────────────────────────

[tasks."brew-update"]
description = "現在の brew/cask 状態から Brewfile を再生成"
run = "brew bundle dump --force --file=./Brewfile"

[tasks.clean]
description = "削除自動化用 snapshot キャッシュをクリア"
run = "rm -rf \"${XDG_CACHE_HOME:-$HOME/.cache}/dotfiles\""

# ─── 外部 skill / Obsidian 外部脳 ─────────────────────

[tasks."skills:sync"]
description = "ext-skills.txt の外部 skill を ghq clone & ~/.claude/skills へ symlink"
run = "bin/skills-sync.sh"

[tasks."obsidian:init"]
description = "Obsidian 外部脳 vault(~/obsidian/brain)の空構造を冪等生成 (手動1回想定)"
run = "$HOME/.claude/skills/obsidian-memory/scripts/init-vault.sh"

# ─── macOS システム設定 ───────────────────────────────

[tasks.macos]
description = "macOS の defaults / nvram を一括設定 (sudo 必要、新マシン1回想定)"
run = "bin/macos-defaults.sh"

# ─── 撮影用ショーケース ───────────────────────────────

[tasks.demo]
description = "撮影用 tmux セッション 'demo' を Panda 配色で構築して attach"
run = "bin/demo.sh"

[tasks."demo:kill"]
description = "撮影用 tmux セッション 'demo' を撤収(他セッションは触らない)"
run = "bin/demo.sh kill"

# ─── テスト / 静的検査 ─────────────────────────────────
# リポ直下=chezmoi 管理外(.chezmoiroot=home)。$HOME には展開されず CI/ローカル検証専用。
# git hooks は拡張子なし(~/.config/git/hooks/{pre-commit,commit-msg})のため、
# pre-commit 自身の `.sh$` shellcheck 網から漏れる。lint/syntax はパス明示で補う。

[tasks.test]
description = "bats で git hooks を検証(一時 HOME + 一時 repo で fixture 実行)"
run = "bats --recursive tests"

[tasks.lint]
description = "shellcheck で git hooks を検査(拡張子なしのためパス明示。error レベル)"
run = "shellcheck --severity=error home/dot_config/git/hooks/private_executable_pre-commit home/dot_config/git/hooks/private_executable_commit-msg"

[tasks.syntax]
description = "bash 3.2(macOS 同梱)構文チェック(拡張子なし hook をパス明示)"
run = """
/bin/bash -n home/dot_config/git/hooks/private_executable_pre-commit
/bin/bash -n home/dot_config/git/hooks/private_executable_commit-msg
"""

[tasks.check]
description = "test + lint + syntax を一括実行"
depends = ["syntax", "lint", "test"]
