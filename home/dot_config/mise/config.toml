# mise グローバル設定
#
# ここの [tools] はどの cwd でも有効。
# プロジェクト固有のツール / タスクは各プロジェクトの mise.toml に書く。

[tools]
chezmoi = "latest"
gh = "latest"
fzf = "latest"
tmux = "latest"
neovim = "latest"
starship = "latest"
ghq = "latest"
"github:d-kuro/gwq" = "latest"  # git worktree マネージャ。ghq と対で並行作業用 worktree を管理(release のプレビルド取得)
eza = "latest"          # ls 代替(Panda 配色は zshrc の EZA_COLORS)
node = "lts"
"npm:@antfu/ni" = "latest"
rust = { version = "latest", components = "rust-analyzer" }

# シェルスクリプト品質ゲート。グローバル git pre-commit から mise exec で呼ぶ。
shellcheck = "latest"
shfmt = "latest"
"npm:secretlint" = "latest"
"npm:@secretlint/secretlint-rule-preset-recommend" = "latest"

# LSP サーバー。Neovim と Claude Code が PATH 経由で同じバイナリを共有する。
# (Zed は自前で LSP を bundle するため対象外。Mason は使わない方針)
lua-language-server = "latest"                 # Lua: Neovim 設定
marksman = "latest"                            # Markdown: ドキュメント類
"npm:@vtsls/language-server" = "latest"        # TS/JS: bin=vtsls。大規模 legacy 向けに高速
"npm:vscode-langservers-extracted" = "latest"  # JSON/HTML/CSS/ESLint
