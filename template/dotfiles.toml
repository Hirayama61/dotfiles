# dotfiles 用 chezmoi 設定の雛形
#
# bootstrap 時に ~/.config/chezmoi/dotfiles.toml としてコピーされます。
# email など、source には commit したくないマシン固有の値を [data] に書きます。

sourceDir = "~/ghq/github.com/Hirayama61/dotfiles"

[chezmoi]
# state DB を config ごとに分離(複数 chezmoi 運用の必須対策)
persistentStateAbsPath = "~/.local/share/chezmoi/dotfiles-state.boltdb"

[data]
# テンプレート(.tmpl)から {{ .email }} のように参照する値をここに書く
# email = "your@email.com"
# git_name = "Your Name"
